[licenses]
# Explicitly allowed licenses for all dependencies.
# All are OSI-approved and compatible with the project's Apache-2.0 license.
allow = [
    "Apache-2.0",
    "MIT",
    "Unlicense",
    "Unicode-3.0",
]

[bans]
# No duplicate dependencies allowed at multiple versions.
multiple-versions = "warn"

[advisories]
# Deny crates with known security advisories.
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
