name: Frontmatter Schema Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/cli/frontmatter/**'
      - 'FRONTMATTER.schema.json'
      - '.github/workflows/frontmatter-schema-check.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  check-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout anchor
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Validate schema JSON syntax
        run: jq -e . .accelmars/canon/templates/accelmars-standard/frontmatter.schema.json > /dev/null

      - name: Run frontmatter scenario tests
        run: cargo test --test frontmatter_fm_scenarios

      - name: Run Pass 2 replay tests
        run: cargo test --test frontmatter_pass2_replay
