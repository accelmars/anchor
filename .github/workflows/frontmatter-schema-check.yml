name: Frontmatter Schema Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/cli/frontmatter/**'
      - 'FRONTMATTER.schema.json'
      - '.github/workflows/frontmatter-schema-check.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  check-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout anchor
        uses: actions/checkout@v4

      - name: Checkout accelmars-workspace (schema + spec)
        uses: actions/checkout@v4
        with:
          repository: accelmars/accelmars-workspace
          path: ../accelmars-workspace
          # Uses GITHUB_TOKEN; requires accelmars-workspace to be accessible
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build anchor
        run: cargo build

      - name: Validate schema JSON syntax
        run: jq -e . ../accelmars-workspace/FRONTMATTER.schema.json > /dev/null

      - name: Run anchor frontmatter check-schema
        # Spec and schema are in the checked-out accelmars-workspace sibling directory
        run: |
          cargo run -- frontmatter check-schema \
            ../accelmars-workspace/FRONTMATTER.md \
            ../accelmars-workspace/FRONTMATTER.schema.json

      - name: Run frontmatter scenario tests
        run: cargo test --test frontmatter_fm_scenarios

      - name: Run Pass 2 replay tests
        run: cargo test --test frontmatter_pass2_replay
