[workspace]
changelog_config = "cliff.toml"
# Disable crates.io publishing until CARGO_REGISTRY_TOKEN is configured.
publish = false
# release-plz creates both git tags and GitHub Releases (no cargo-dist on anchor).
git_release_enable = true
# Enforce package-prefixed tags: accelmars-anchor-v{version}
git_tag_name = "{{ package }}-v{{ version }}"
