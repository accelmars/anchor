[workspace]
changelog_config = "cliff.toml"
# Disable crates.io publishing until CARGO_REGISTRY_TOKEN is configured.
publish = false
# cargo-dist owns GitHub Release creation (with binary assets).
# release-plz creates git tags only; GitHub Releases are created by cargo-dist.
git_release_enable = false
# Enforce package-prefixed tags: accelmars-anchor-v{version}
git_tag_name = "{{ package }}-v{{ version }}"

# Per-package overrides
# changelog_update = false: cliff (root CHANGELOG.md) is the single source of truth.
# Without this override, release-plz manages a per-package CHANGELOG separately
# from cliff's root CHANGELOG.md; auto-merge triggers another release-plz scan,
# which finds the per-package file out of sync, creates another release PR — infinite loop.
# Decision: 260501-public-repo-release-pipeline.md
[[package]]
name = "accelmars-anchor"
changelog_update = false
